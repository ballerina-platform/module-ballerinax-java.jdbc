version = "1.14.2"
path = "../native/build/libs/java.jdbc-native-1.14.2-SNAPSHOT.jar"

[[platform.java21.dependency]]
groupId = "io.ballerina.stdlib"
artifactId = "sql-native"
version = "1.18.0"
path = "./lib/sql-native-1.18.0-SNAPSHOT.jar"
