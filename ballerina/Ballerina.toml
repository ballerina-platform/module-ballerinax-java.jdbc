[package]
org = "ballerinax"
name = "java.jdbc"
version = "1.14.2"
authors = ["Ballerina"]
keywords = ["Cost/Free", "Vendor/Oracle", "Area/Database", "Type/Connector"]
repository = "https://github.com/ballerina-platform/module-ballerinax-java.jdbc"
icon = "icon.png"
license = ["Apache-2.0"]
distribution = "2201.12.0"

[platform.java21]
graalvmCompatible = true

[[platform.java21.dependency]]
groupId = "io.ballerina.stdlib"
